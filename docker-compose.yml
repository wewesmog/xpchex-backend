services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xpchex-backend-api
    restart: unless-stopped
    env_file:
      - .env
    # Host 8001 → container 8000 (avoids clash if something else uses host :8000)
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
